<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>cadastre seu veiculo para vender mais rapido</h3>
        </header>
        <div class="form-container">
            <div class="forme-header">
                <p>formulário</p>
            </div>
    
        <div class="form-body">
            <h1 class="titulo-form">venda facil seu carro</h1>
            <p>descreva as carateristicas do seu carro e marque os opcionais que ele possui.</p>
            <form onsubmit="salvarCarro(event)">
                <div class="caixaInputs">
                    <label for="title">titulo do anuncio<span class=""campo-obrigatorio>*</span></label>
                    <input type="text" name="=title" id="title" class="block" placeholder="digite titulo para o anuncio">
                </div>
                <div class="caixaInputs">
                    <label for="preco">preço<span class=""campo-obrigatorio>*</span></label>
                    <input type="number" name="=preco" id="preco" class="block" placeholder="digite o preço">
                </div>
                <div class="caixaIOnputs">
                    <label for="descricao">descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="digite a descrição de seu veiculo"></textarea>
                </div>
                <div class="caixaInputs">
                    <label for="marca">marca<span class=""campo-obrigatorio>*</span></label>
                    <input type="text" name="=marca" id="marca" class="block" placeholder="digite a marca">
                </div>
                <div class="caixaInputs">
                    <label for="modelo">modelo<span class=""campo-obrigatorio>*</span></label>
                    <input type="text" name="=modelo" id="modelo" class="block" placeholder="digite o modelo">
                </div>
                <div class="caixaInputs">
                    <label for="kilometragem">kilometragem<span class=""campo-obrigatorio>*</span></label>
                    <input type="text" name="=kilometragem" id="kilometragem" class="block" placeholder="digite a kilometragem">
                </div>
                <div class="caixaInputs">
                    <label for="data-compra">data-compra<span class=""campo-obrigatorio>*</span></label>
                    <input type="date" name="data-compra" id="data-compra" class="block" placeholder="digite a data da compra">
                </div>
                <div class="caixaInputs">
                    <p>tipo de câmbio:<span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                    <input type="radio" name="marcha" id="manual" value="manual">
                    <label for="manual">Manual</label>
                </div>
                <div class="caixaOpcional">
                    <p>Opcionais</p>
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="Opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="ar condicionado" value="ar condicionado">
                            <label for="ar condicionado">Ar condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="camera de ré" value="camera de ré">
                            <label for="camera de ré">Camera de re</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaOpcional">
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="Opcional[]" id="assistente de pista" value="assistente de pista">
                            <label for="assistente de pista">assistente de pista</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="partida sem chave" value="partida sem chave">
                            <label for="partida sem chave">Partida sem chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="integração com celular" value="integração com celular">
                            <label for="integração com celular">Integração com celular</label>
                        </li>
                        <li>
                            <input type="checkbox" name="Opcional[]" id="banco de couro" value="banco de couro">
                            <label for="banco de couro">Banco de couro</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaInputs">
                    <p>fotos do carro <spa class="campo-obrigatorio">*</spa></p>
                    <input type="file" name="images" id="images" multiple accept="image/png, image/jpg">
                </div>
                <input type="submit" value="Enviar" class="btn-submit"> 
            </form>
            <hr>
            <h2>carros cadastrados</h2>
            <div id="listaCarros"></div>
        </div>
    </div>
    <script src="acript.js"></script>
</body>

</html>
